name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - migrate/new-lutaml-spa
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Generate CityGML 2.0 SPA (PLATEAU v5.1)
        run: |
          mkdir -p citygml-2
          bundle exec ea spa 20251010_current_plateau_v5.1.qea -o citygml-2/index.html

      - name: Generate CityGML 3.0 SPA (Consolidated Draft)
        run: |
          mkdir -p citygml-3
          bundle exec ea spa 20260323_CityGML_3.0_Consolidated_Draft.qea -o citygml-3/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
