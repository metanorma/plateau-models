name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # Native Ea::Model pipeline. Sharded mode because CityGML 3.0
      # (45 MB QEA) is too large for single-file output.
      - name: Generate CityGML 2.0 SPA (PLATEAU v5.1)
        run: |
          bundle exec ea spa 20251010_current_plateau_v5.1.qea \
            --config citygml-2.config.yml \
            --mode=sharded \
            -o citygml-2

      - name: Generate CityGML 3.0 SPA (Consolidated Draft)
        run: |
          bundle exec ea spa 20260323_CityGML_3.0_Consolidated_Draft.qea \
            --config citygml-3.config.yml \
            --mode=sharded \
            -o citygml-3

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
