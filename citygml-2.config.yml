metadata:
  name: "PLATEAU Model — CityGML 2.0"
  title: "PLATEAU Model｜CityGML 2.0 UML Browser"
  description: >
    Interactive UML browser for the PLATEAU v5.0 (CityGML 2.0) 3D City Model
    specification from MLIT Japan. Covers i-UR, FGD, and related urban-planning
    schemas.
  version: "5.0"
  license: "PLATEAU license"
  homepage: "https://www.mlit.go.jp/plateau/"
  repository: "https://github.com/metanorma/plateau-models"
  authors:
    - name: "Ministry of Land, Infrastructure, Transport and Tourism (MLIT Japan)"
  tags:
    - plateau
    - citygml
    - citygml-2
    - 3d-city-model
    - japan
    - urban-planning
    - geospatial
  links:
    - name: "Project PLATEAU"
      url: "https://www.mlit.go.jp/plateau/"
    - name: "PLATEAU Model Portal"
      url: "https://metanorma.github.io/plateau-models/"

  appearance:
    logos:
      square:
        light:
          path: "../images/logo-plateau_logo-square.svg"
        dark:
          path: "../images/logo-plateau_logo-square-dark.svg"
      long:
        light:
          path: "../images/logo-plateau_logo-square.svg"
        dark:
          path: "../images/logo-plateau_logo-square-dark.svg"

ui:
  title: "PLATEAU Model｜CityGML 2.0 UML Browser"
  description: "Interactive UML browser for the PLATEAU v5.0 (CityGML 2.0) 3D City Model."

# Hide diagrams in the SPA until the renderer matches EA visual fidelity.
diagrams:
  enabled: false
